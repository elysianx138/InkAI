services:
  mysql:
    image: mysql:8.0
    ports: 
      - 3306:3306
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: blog
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    ports: 
      - 6379:6379


  web:
    build: .
    ports: 
      - 8000:8000
    depends_on:
      - mysql
      - redis
    env_file: .env

    environment:
      MYSQL_HOST: mysql
      REDIS_HOST: redis

    


volumes:
  mysql_data: